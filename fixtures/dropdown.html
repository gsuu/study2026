<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dropdown Fixture</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #eef2f6;
        color: #18222c;
      }
      .page {
        width: min(100% - 32px, 720px);
        margin: 48px auto;
        padding: 24px;
        border: 1px solid #d4dce6;
        border-radius: 24px;
        background: #fdfefe;
      }
      .dropdown {
        position: relative;
        width: 280px;
      }
      .dropdown-toggle {
        width: 100%;
        padding: 14px 16px;
        border: 1px solid #c5d0de;
        border-radius: 14px;
        background: #fff;
        text-align: left;
        font: inherit;
        cursor: pointer;
      }
      .dropdown-menu {
        display: none;
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        right: 0;
        padding: 8px;
        border: 1px solid #c5d0de;
        border-radius: 14px;
        background: #fff;
        box-shadow: 0 12px 24px rgba(24, 34, 44, 0.12);
      }
      .dropdown-menu.open {
        display: block;
      }
      .dropdown-item {
        display: block;
        width: 100%;
        padding: 10px 12px;
        border: 0;
        border-radius: 10px;
        background: transparent;
        text-align: left;
        font: inherit;
        cursor: pointer;
      }
      .dropdown-item.selected {
        background: #dbe8f8;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <h1>드롭다운 예제</h1>
      <div class="dropdown">
        <button class="dropdown-toggle">
          <span class="dropdown-label">선택하세요</span>
        </button>
        <div class="dropdown-menu">
          <button class="dropdown-item" data-value="latest">최신순</button>
          <button class="dropdown-item" data-value="popular">인기순</button>
          <button class="dropdown-item" data-value="price">가격순</button>
        </div>
      </div>
    </main>

    <script>
      const dropdown = document.querySelector('.dropdown');
      const toggleButton = dropdown?.querySelector('.dropdown-toggle');
      const label = dropdown?.querySelector('.dropdown-label');
      const menu = dropdown?.querySelector('.dropdown-menu');
      const items = [...document.querySelectorAll('.dropdown-item')];

      toggleButton?.addEventListener('click', () => {
        document.querySelector('.dropdown-menu').classList.toggle('open');
      });

      items.forEach(item => {
        item.addEventListener('click', () => {
          document.querySelector('.dropdown-label').textContent = item.textContent;
          document.querySelector('.dropdown-menu').classList.remove('open');
        });
      });

      document.addEventListener('click', event => {
        if (!event.target.closest('.dropdown')) {
          document.querySelector('.dropdown-menu').classList.remove('open');
        }
      });
    </script>
  </body>
</html>
